<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Request accepted</title></head>
  <body style="margin:0;padding:0;background:#0a0a0a;color:#f5f5f0;font-family:'Inter',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0a0a0a;padding:40px 20px;">
      <tr><td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background:#111111;border:1px solid #2a2a2a;">
          <tr><td style="padding:32px 40px 16px;border-bottom:1px solid #2a2a2a;">
            <span style="font-family:Georgia,serif;font-size:28px;letter-spacing:.08em;color:#c9a96e;">STATE&nbsp;SIDE&nbsp;GLOBAL</span>
          </td></tr>
          <tr><td style="padding:40px;">
            <h1 style="margin:0 0 16px;font-family:Georgia,serif;font-weight:400;font-size:32px;">Your request is accepted.</h1>
            <p style="margin:0 0 16px;color:#a0a0a0;line-height:1.6;">
              {{firstName}}, we've reviewed <strong style="color:#f5f5f0;">{{title}}</strong> (Request <span style="font-family:monospace;">{{requestNumber}}</span>) and we can source it for you.
            </p>
            <table role="presentation" width="100%" style="border-top:1px solid #2a2a2a;border-bottom:1px solid #2a2a2a;margin:24px 0;">
              <tr><td style="padding:14px 0;color:#a0a0a0;font-size:14px;">Additional cost</td><td style="padding:14px 0;color:#c9a96e;font-size:18px;text-align:right;font-weight:600;">{{additionalCost}}</td></tr>
            </table>
            <p style="margin:0 0 24px;color:#a0a0a0;line-height:1.6;font-style:italic;">{{additionalCostNote}}</p>
            <p style="margin:0 0 24px;color:#a0a0a0;line-height:1.6;">
              Pay the additional cost to begin sourcing your piece.
            </p>
            <p style="margin:24px 0;">
              <a href="{{payUrl}}" style="display:inline-block;padding:14px 32px;background:#c9a96e;color:#0a0a0a;text-decoration:none;font-weight:600;letter-spacing:.06em;">PAY ADDITIONAL COST</a>
            </p>
          </td></tr>
          <tr><td style="padding:24px 40px;border-top:1px solid #2a2a2a;color:#666666;font-size:12px;">
            <a href="{{clientUrl}}" style="color:#c9a96e;text-decoration:none;">statesideglobal.com</a>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
