<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Add-on unlocked</title></head>
  <body style="margin:0;padding:0;background:#0a0a0a;color:#f5f5f0;font-family:'Inter',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0a0a0a;padding:40px 20px;">
      <tr><td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background:#111111;border:1px solid #2a2a2a;">
          <tr><td style="padding:32px 40px 16px;border-bottom:1px solid #2a2a2a;">
            <span style="font-family:Georgia,serif;font-size:28px;letter-spacing:.08em;color:#c9a96e;">STATE&nbsp;SIDE&nbsp;GLOBAL</span>
          </td></tr>
          <tr><td style="padding:40px;">
            <h1 style="margin:0 0 16px;font-family:Georgia,serif;font-weight:400;font-size:32px;">{{addonName}} unlocked.</h1>
            <p style="margin:0 0 24px;color:#a0a0a0;line-height:1.6;">
              {{firstName}}, your access has been upgraded. New features are available now.
            </p>
            <p style="margin:0 0 24px;color:#a0a0a0;font-size:14px;">Amount: <span style="color:#c9a96e;">{{amount}}</span> &nbsp;·&nbsp; Reference: <span style="color:#666666;font-family:monospace;font-size:12px;">{{reference}}</span></p>
            <p style="margin:24px 0;">
              <a href="{{shopUrl}}" style="display:inline-block;padding:14px 32px;background:#c9a96e;color:#0a0a0a;text-decoration:none;font-weight:600;letter-spacing:.06em;">EXPLORE</a>
            </p>
          </td></tr>
          <tr><td style="padding:24px 40px;border-top:1px solid #2a2a2a;color:#666666;font-size:12px;">
            <a href="{{clientUrl}}" style="color:#c9a96e;text-decoration:none;">statesideglobal.com</a>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
