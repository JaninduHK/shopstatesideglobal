<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Reset your password</title></head>
  <body style="margin:0;padding:0;background:#0a0a0a;color:#f5f5f0;font-family:'Inter',Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0a0a0a;padding:40px 20px;">
      <tr><td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;background:#111111;border:1px solid #2a2a2a;">
          <tr><td style="padding:32px 40px 16px;border-bottom:1px solid #2a2a2a;">
            <span style="font-family:Georgia,serif;font-size:28px;letter-spacing:.08em;color:#c9a96e;">STATE&nbsp;SIDE&nbsp;GLOBAL</span>
          </td></tr>
          <tr><td style="padding:40px;">
            <h1 style="margin:0 0 16px;font-family:Georgia,serif;font-weight:400;font-size:32px;">Password reset</h1>
            <p style="margin:0 0 16px;color:#a0a0a0;line-height:1.6;">
              {{firstName}}, we received a request to reset your password. Click below to set a new one.
            </p>
            <p style="margin:24px 0;">
              <a href="{{resetUrl}}" style="display:inline-block;padding:14px 32px;background:#c9a96e;color:#0a0a0a;text-decoration:none;font-weight:600;letter-spacing:.06em;">RESET PASSWORD</a>
            </p>
            <p style="margin:24px 0 0;color:#666666;font-size:13px;line-height:1.6;">
              Or copy this link: <br /><span style="color:#a0a0a0;word-break:break-all;">{{resetUrl}}</span>
            </p>
            <p style="margin:24px 0 0;color:#666666;font-size:13px;">This link expires in 1 hour. If you didn't request a reset, ignore this email.</p>
          </td></tr>
          <tr><td style="padding:24px 40px;border-top:1px solid #2a2a2a;color:#666666;font-size:12px;">
            <a href="{{clientUrl}}" style="color:#c9a96e;text-decoration:none;">statesideglobal.com</a>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
